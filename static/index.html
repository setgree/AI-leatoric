<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI-leatoric</title>
  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.9/build/opensheetmusicdisplay.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1   { font-size: 1.4rem; margin-bottom: 0.25rem; }
    p.sub { color: #555; margin-top: 0; margin-bottom: 1.5rem; font-size: 0.9rem; }

    section { margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; margin-bottom: 0.5rem; }

    button {
      padding: 0.4rem 1rem; margin-right: 0.5rem;
      border: 1px solid #888; border-radius: 4px;
      background: #f5f5f5; cursor: pointer; font-size: 0.9rem;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button.active   { background: #c00; color: white; border-color: #900; }
    button.metro-on { background: #080; color: white; border-color: #060; }

    #bpm-display { font-size: 0.85rem; color: #555; margin-top: 0.4rem; }
    #status    { font-size: 0.85rem; color: #444; margin-top: 0.5rem; min-height: 1.2em; }
    #error-detail { font-size: 0.8rem; color: #900; margin-top: 0.3rem; font-family: monospace; white-space: pre-wrap; }

    #score-container {
      margin-top: 1rem; border: 1px solid #ddd; border-radius: 4px;
      padding: 1rem; min-height: 200px; background: white;
    }
    #download-link { margin-top: 0.75rem; font-size: 0.85rem; }
    #download-link a { color: #069; }
  </style>
</head>
<body>

<h1>AI-leatoric</h1>
<p class="sub">Sing or play a melody → get 4-part SATB sheet music</p>

<!-- Step 1: BPM + Metronome -->
<section>
  <h2>Step 1 — Set the tempo</h2>
  <input type="range" id="bpm-slider" min="40" max="200" value="80" style="width:260px">
  <button id="metro-btn" style="margin-left:0.75rem">Metronome off</button>
  <div id="bpm-display">80 BPM</div>
</section>

<!-- Step 2: Settings -->
<section>
  <h2>Step 2 — Settings</h2>

  <div style="margin-bottom:0.75rem">
    <label style="font-size:0.9rem;font-weight:bold">Harmonizer:</label><br>
    <label style="font-size:0.9rem">
      <input type="radio" name="backend" id="backend-claude" value="true" checked>
      Claude API <span style="color:#555;font-size:0.8rem">(better harmony, requires API key)</span>
    </label>
    &nbsp;&nbsp;
    <label style="font-size:0.9rem">
      <input type="radio" name="backend" id="backend-local" value="false">
      Local <span style="color:#555;font-size:0.8rem">(rule-based, no API key needed)</span>
    </label>
  </div>

  <div style="margin-bottom:0.75rem">
    <label for="voice-select" style="font-size:0.9rem;font-weight:bold">I'm singing/playing the:</label><br>
    <select id="voice-select" style="padding:0.3rem 0.6rem; font-size:0.9rem; margin-top:0.25rem">
      <option value="soprano">Soprano</option>
      <option value="alto">Alto</option>
      <option value="tenor">Tenor</option>
      <option value="bass">Bass</option>
    </select>
  </div>

  <div style="margin-bottom:0.75rem">
    <label for="era-select" style="font-size:0.9rem;font-weight:bold">Era:</label><br>
    <select id="era-select" style="padding:0.3rem 0.6rem; font-size:0.9rem; margin-top:0.25rem">
      <option value="classical">Classical — diatonic triads</option>
      <option value="baroque">Baroque — triads + V7 cadences</option>
      <option value="romantic">Romantic — 7th chords throughout</option>
      <option value="jazz">Jazz — extended harmony (7ths, tritone subs)</option>
    </select>
  </div>

  <div id="weirdness-section" style="margin-bottom:0.75rem">
    <label for="weirdness-slider" style="font-size:0.9rem;font-weight:bold">
      Weirdness: <span id="weirdness-value">50</span>/100
    </label><br>
    <input type="range" id="weirdness-slider" min="1" max="100" value="50"
           style="width:260px; margin-top:0.25rem">
    <span style="font-size:0.8rem;color:#555" id="weirdness-label">balanced</span>
  </div>
</section>

<!-- Step 3: Record -->
<section>
  <h2>Step 3 — Record your melody</h2>
  <button id="record-btn">Record</button>
  <button id="stop-btn" disabled>Stop</button>
  <div id="status">Ready.</div>
  <div id="error-detail"></div>
</section>

<!-- Result -->
<div id="score-container" style="display:none">
  <div id="osmd-target"></div>
</div>
<div id="download-link"></div>

<script>
// [claude-code/claude-sonnet-4-6] tap tempo + Web Audio metronome click track
// [claude-code/claude-sonnet-4-6] BPM slider + metronome
const weirdnessSlider  = document.getElementById('weirdness-slider');
const weirdnessValue   = document.getElementById('weirdness-value');
const weirdnessLabel   = document.getElementById('weirdness-label');
const weirdnessSection = document.getElementById('weirdness-section');

const WEIRDNESS_LABELS = [
  [20,  'very conservative'],
  [40,  'traditional'],
  [60,  'balanced'],
  [80,  'adventurous'],
  [100, 'experimental'],
];

weirdnessSlider.addEventListener('input', () => {
  const v = parseInt(weirdnessSlider.value);
  weirdnessValue.textContent = v;
  weirdnessLabel.textContent = WEIRDNESS_LABELS.find(([max]) => v <= max)[1];
});

document.querySelectorAll('input[name="backend"]').forEach(r => {
  r.addEventListener('change', () => {
    weirdnessSection.style.display = r.value === 'true' ? 'block' : 'none';
  });
});

// [claude-code/claude-sonnet-4-6] BPM slider drives metronome and is sent to server
const bpmSlider   = document.getElementById('bpm-slider');
const bpmDisplay  = document.getElementById('bpm-display');
const metroBtn    = document.getElementById('metro-btn');
const recordBtn   = document.getElementById('record-btn');
const stopBtn     = document.getElementById('stop-btn');
const statusEl    = document.getElementById('status');
const errorDetail = document.getElementById('error-detail');
const scoreDiv    = document.getElementById('score-container');
const osmdTarget  = document.getElementById('osmd-target');
const dlLink      = document.getElementById('download-link');

let detectedBpm  = parseInt(bpmSlider.value);
let metroRunning = false;
let metroTimeout = null;
let audioCtx     = null;

bpmSlider.addEventListener('input', () => {
  detectedBpm = parseInt(bpmSlider.value);
  bpmDisplay.textContent = `${detectedBpm} BPM`;
  if (metroRunning) { stopMetronome(); startMetronome(); }
});

function playClick(loud) {
  if (!audioCtx) audioCtx = new AudioContext();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = loud ? 1200 : 900;
  gain.gain.setValueAtTime(loud ? 0.4 : 0.25, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
  osc.start(now);
  osc.stop(now + 0.07);
}

let beatCount = 0;
function scheduleClick() {
  if (!metroRunning) return;
  playClick(beatCount % 4 === 0);
  beatCount++;
  metroTimeout = setTimeout(scheduleClick, (60 / detectedBpm) * 1000);
}

function startMetronome() {
  if (metroRunning) return;
  metroRunning = true;
  beatCount = 0;
  metroBtn.textContent = 'Metronome ON';
  metroBtn.classList.add('metro-on');
  scheduleClick();
}

function stopMetronome() {
  metroRunning = false;
  clearTimeout(metroTimeout);
  metroBtn.textContent = 'Metronome off';
  metroBtn.classList.remove('metro-on');
}

metroBtn.addEventListener('click', () => {
  if (metroRunning) stopMetronome(); else startMetronome();
});

// [claude-code/claude-sonnet-4-6] record via Web Audio API as raw PCM → encode to WAV in browser
// avoids needing ffmpeg on the server; soundfile can decode WAV natively
let micStream    = null;
let audioSource  = null;
let scriptProc   = null;
let pcmSamples   = [];
let recordingSR  = 44100;

function encodeWAV(samples, sampleRate) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buf);
  function write(off, str) { for (let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); }
  function u32(off, v) { view.setUint32(off, v, true); }
  function u16(off, v) { view.setUint16(off, v, true); }
  write(0,  'RIFF');  u32(4, 36 + samples.length*2);  write(8, 'WAVE');
  write(12, 'fmt ');  u32(16, 16);  u16(20, 1);  u16(22, 1);
  u32(24, sampleRate);  u32(28, sampleRate*2);  u16(32, 2);  u16(34, 16);
  write(36, 'data');  u32(40, samples.length*2);
  for (let i=0; i<samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i*2, s < 0 ? s*0x8000 : s*0x7FFF, true);
  }
  return new Blob([buf], { type: 'audio/wav' });
}

recordBtn.addEventListener('click', async () => {

  // resume AudioContext if suspended (browser autoplay policy)
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  recordingSR = audioCtx.sampleRate;

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    statusEl.textContent = 'Microphone access denied. Please allow mic access and try again.';
    return;
  }

  pcmSamples = [];
  audioSource = audioCtx.createMediaStreamSource(micStream);
  scriptProc  = audioCtx.createScriptProcessor(4096, 1, 1);
  scriptProc.onaudioprocess = e => {
    const data = e.inputBuffer.getChannelData(0);
    pcmSamples.push(new Float32Array(data));
  };
  audioSource.connect(scriptProc);
  scriptProc.connect(audioCtx.destination);

  recordBtn.disabled = true;
  recordBtn.classList.add('active');
  stopBtn.disabled = false;
  errorDetail.textContent = '';
  statusEl.textContent = 'Recording… sing or play your melody, then click Stop.';
});

stopBtn.addEventListener('click', () => {
  stopMetronome();

  if (scriptProc)  { scriptProc.disconnect();  scriptProc = null; }
  if (audioSource) { audioSource.disconnect(); audioSource = null; }
  if (micStream)   { micStream.getTracks().forEach(t => t.stop()); micStream = null; }

  stopBtn.disabled = true;
  recordBtn.disabled = false;
  recordBtn.classList.remove('active');
  statusEl.textContent = 'Processing…';
  uploadAudio();
});

async function uploadAudio() {
  const merged = new Float32Array(pcmSamples.reduce((n,b) => n + b.length, 0));
  let offset = 0;
  for (const b of pcmSamples) { merged.set(b, offset); offset += b.length; }

  const blob = encodeWAV(merged, recordingSR);

  if (blob.size < 100) {
    statusEl.textContent = 'Error: recording was empty. Try recording for longer.';
    return;
  }

  const fd = new FormData();
  fd.append('file', blob, 'recording.wav');
  fd.append('bpm', String(detectedBpm));
  fd.append('era', document.getElementById('era-select').value);
  fd.append('voice_part', document.getElementById('voice-select').value);
  fd.append('weirdness', weirdnessSlider.value);
  fd.append('use_claude', document.querySelector('input[name="backend"]:checked').value);

  let res, json;
  try {
    res = await fetch('/transcribe', { method: 'POST', body: fd });
  } catch (e) {
    statusEl.textContent = 'Network error reaching server.';
    errorDetail.textContent = String(e);
    return;
  }

  // show raw text if response isn't JSON (e.g. server crash)
  const text = await res.text();
  try {
    json = JSON.parse(text);
  } catch {
    statusEl.textContent = `Server error (HTTP ${res.status})`;
    errorDetail.textContent = text.slice(0, 500);
    return;
  }

  if (json.error) {
    statusEl.textContent = `Error: ${json.error}`;
    return;
  }

  statusEl.textContent = 'Rendering score…';
  await renderScore(json.musicxml);

  const keyLabel = json.key ? ` · Key: ${json.key}` : '';
  const eraLabel = json.era ? ` · Era: ${json.era}` : '';
  dlLink.innerHTML = `<a href="${json.musicxml}" download>Download MusicXML</a> (open in MuseScore for playback)${keyLabel}${eraLabel}`;
}

// [claude-code/claude-sonnet-4-6] fetch MusicXML and render inline with OpenSheetMusicDisplay
async function renderScore(xmlUrl) {
  const resp = await fetch(xmlUrl);
  const xmlText = await resp.text();
  osmdTarget.innerHTML = '';
  scoreDiv.style.display = 'block';
  const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(osmdTarget, {
    autoResize: true,
    drawTitle: false,
  });
  try {
    await osmd.load(xmlText);
    osmd.render();
    statusEl.textContent = 'Done. Download MusicXML below to open in MuseScore.';
  } catch (e) {
    statusEl.textContent = 'Score rendered with warnings (see browser console for details).';
    console.error(e);
  }
}
</script>

</body>
</html>
