<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Melody → SATB Harmonizer (MVP)</title>
  </head>
  <body>
    <h2>Upload a short monophonic WAV (voice/cello)</h2>
    <form id="uform">
      <input type="file" id="afile" accept="audio/*" />
      <button type="button" id="send">Upload</button>
    </form>
    <div id="result"></div>

    <script>
      document.getElementById('send').onclick = async function(){
        const f = document.getElementById('afile').files[0];
        if(!f){ alert('select a file'); return }
        const fd = new FormData(); fd.append('file', f);
        const res = await fetch('/transcribe', {method:'POST', body:fd});
        const j = await res.json();
        if(j.error){ document.getElementById('result').innerText = j.error; return }
        const html = `MusicXML: <a href="${j.musicxml}" target="_blank">open</a><br/>` +
          `Audio: <audio controls src="${j.audio}"></audio>`;
        document.getElementById('result').innerHTML = html;
      };
    </script>
  </body>
</html>
